services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: keyboard-trainer-db
    command: ["postgres", "-p", "5434"]
    environment:
      POSTGRES_USER: ${DB_USER:-keyboardtrainer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-keyboardtrainer_dev}
      POSTGRES_DB: ${DB_NAME:-keyboardtrainer}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5434}:5434"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/Server/Database/Migrations:/docker-entrypoint-initdb.d
    networks:
      - keyboard-trainer-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-keyboardtrainer} -p 5434"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # F# Server Service (ASP.NET Core 8)
  server:
    build:
      context: .
      dockerfile: ./Dockerfile.server
      args:
        - BUILD_CONFIGURATION=Release
    container_name: keyboard-trainer-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://0.0.0.0:5000
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5434
      DB_USER: ${DB_USER:-keyboardtrainer}
      DB_PASSWORD: ${DB_PASSWORD:-keyboardtrainer_dev}
      DB_NAME: ${DB_NAME:-keyboardtrainer}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}
    ports:
      - "${SERVER_PORT:-5000}:5000"
    networks:
      - keyboard-trainer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # Nginx Reverse Proxy & Static File Server
  nginx:
    image: nginx:alpine
    container_name: keyboard-trainer-nginx
    depends_on:
      - server
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx-default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./src/Client/public:/usr/share/nginx/html:ro
    networks:
      - keyboard-trainer-network
    restart: unless-stopped

networks:
  keyboard-trainer-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
